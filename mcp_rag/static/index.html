<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>code-rag</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --text-muted: #8b949e; --accent: #58a6ff;
  --accent-dim: #1f6feb; --green: #3fb950; --red: #f85149;
  --yellow: #d29922; --font: 'Segoe UI', system-ui, sans-serif;
  --mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Layout */
.app { max-width: 1100px; margin: 0 auto; padding: 1rem; }
header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.75rem; }
header h1 { font-size: 1.25rem; font-weight: 600; }

/* Tabs */
.tabs { display: flex; gap: 0; }
.tab-btn {
  padding: 0.5rem 1.25rem; cursor: pointer; background: none;
  border: 1px solid var(--border); border-bottom: none; color: var(--text-muted);
  font-size: 0.875rem; border-radius: 6px 6px 0 0; transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: var(--surface); }
.tab-btn.active { color: var(--text); background: var(--surface); border-color: var(--accent); border-bottom-color: var(--surface); }
.tab-panel { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 0 6px 6px 6px; padding: 1.25rem; }
.tab-panel.active { display: block; }

/* Forms */
input[type="text"], input[type="number"], select {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem; width: 100%;
}
input:focus { outline: none; border-color: var(--accent); }
button {
  padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--border);
  cursor: pointer; font-size: 0.875rem; transition: all 0.15s;
}
.btn-primary { background: var(--accent-dim); color: #fff; border-color: var(--accent-dim); }
.btn-primary:hover { background: var(--accent); }
.btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Progress */
.progress-wrap { margin: 1rem 0; }
.progress-bar-outer {
  height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden;
}
.progress-bar-inner {
  height: 100%; background: var(--accent); transition: width 0.3s; width: 0%;
}
.progress-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; }
.unit-progress { background: var(--green); }
.log-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 0.75rem; margin-top: 0.75rem; max-height: 200px; overflow-y: auto;
  font-family: var(--mono); font-size: 0.75rem; color: var(--text-muted);
  line-height: 1.5;
}

/* Results */
.result-item {
  padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 0.5rem; cursor: pointer; transition: border-color 0.15s;
}
.result-item:hover { border-color: var(--accent); }
.result-path { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
.result-summary { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }
.result-score {
  font-size: 0.75rem; color: var(--yellow); float: right; font-family: var(--mono);
}

/* Source viewer */
.source-viewer {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 1rem; margin-top: 0.75rem; display: none;
}
.source-viewer.visible { display: block; }
.source-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}
.source-path { font-family: var(--mono); font-size: 0.8rem; color: var(--accent); }
.source-summary { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.75rem; }
pre.source-code {
  background: var(--bg); color: var(--text); font-family: var(--mono);
  font-size: 0.8rem; line-height: 1.5; overflow-x: auto; white-space: pre;
  max-height: 500px; overflow-y: auto; padding: 0.5rem;
}

/* Browse v2 */
.browse-breadcrumb {
  display: flex; align-items: center; flex-wrap: wrap; gap: 0.25rem;
  padding: 0.4rem 0; margin-bottom: 0.75rem;
  border-bottom: 1px solid var(--border); font-size: 0.85rem; min-height: 2rem;
}
.bc-link { color: var(--accent); cursor: pointer; padding: 0.1rem 0.2rem; border-radius: 3px; }
.bc-link:hover { text-decoration: underline; background: var(--surface); }
.bc-sep { color: var(--text-muted); user-select: none; }
.bc-current { color: var(--text); font-weight: 600; padding: 0.1rem 0.2rem; }

.browse-list { display: flex; flex-direction: column; gap: 3px; }

/* Current-level summary banner */
.browse-banner {
  padding: 0.65rem 1rem; margin-bottom: 0.75rem;
  background: var(--surface); border: 1px solid var(--border);
  border-left: 3px solid var(--accent); border-radius: 0 6px 6px 0;
  font-size: 0.85rem; color: var(--text-muted); line-height: 1.55;
}

/* Two-row entry card */
.browse-entry {
  padding: 0.55rem 0.75rem; border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--bg);
}
.browse-entry:hover { border-color: var(--accent); background: var(--surface); }
.be-row1 { display: flex; align-items: center; gap: 0.65rem; }
.be-type {
  font-size: 0.7rem; font-weight: 700; padding: 0.1rem 0.45rem;
  border-radius: 4px; flex-shrink: 0; font-family: var(--mono);
  min-width: 3.25rem; text-align: center; letter-spacing: 0.02em;
}
.be-type-repo      { background: #0d2645; color: #79c0ff; }
.be-type-dir       { background: #1c1c1c; color: var(--text-muted); }
.be-type-file      { background: #0f2f0f; color: var(--green); }
.be-type-class     { background: #2a1a0a; color: #f0883e; }
.be-type-unit      { background: #0d1a2e; color: var(--accent); }
.be-type-section   { background: #1a1020; color: #c792ea; }
.be-type-sql       { background: #0d2020; color: #89ddff; }
.be-type-struct    { background: #1a1a0a; color: #e6db74; }
.be-type-interface { background: #0a1a1a; color: #a8ff60; }
.be-type-enum      { background: #1a0d10; color: #ff8b92; }
.be-name { font-family: var(--mono); font-size: 0.85rem; color: var(--text); flex: 1; }
.be-chevron { color: var(--text-muted); flex-shrink: 0; font-size: 1rem; }
/* Summary lives on a second line, indented to align with the name */
.be-summary {
  margin-top: 0.3rem;
  padding-left: calc(3.25rem + 0.65rem + 0.65rem); /* badge width + gap + entry padding */
  font-size: 0.8rem; color: var(--text-muted); line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}

.browse-detail {
  margin-top: 1rem; padding: 1rem; background: var(--bg);
  border: 1px solid var(--border); border-radius: 6px;
}
.browse-detail-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
}

/* Inline helpers */
.row { display: flex; gap: 0.5rem; align-items: center; }
.mt { margin-top: 0.75rem; }
.mb { margin-bottom: 0.75rem; }
.muted { color: var(--text-muted); font-size: 0.85rem; }
.badge {
  display: inline-block; padding: 0.1rem 0.5rem; border-radius: 10px;
  font-size: 0.7rem; font-weight: 600;
}
.badge-green { background: #0f5323; color: var(--green); }
.badge-yellow { background: #3b2e00; color: var(--yellow); }
.badge-blue { background: #0d2645; color: var(--accent); }

/* Folder picker */
.folder-picker {
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg);
  margin-bottom: 0.75rem;
}
.folder-picker-bar {
  display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem;
  border-bottom: 1px solid var(--border);
}
.folder-picker-bar button {
  padding: 0.25rem 0.5rem; font-size: 0.8rem; flex-shrink: 0;
}
.folder-breadcrumb {
  font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted);
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.folder-breadcrumb span { cursor: pointer; color: var(--accent); }
.folder-breadcrumb span:hover { text-decoration: underline; }
.folder-list {
  max-height: 220px; overflow-y: auto; padding: 0.25rem;
}
.folder-item {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.3rem 0.75rem; cursor: pointer; border-radius: 4px;
  font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted);
}
.folder-item:hover { background: var(--surface); color: var(--text); }
.folder-icon { flex-shrink: 0; width: 1rem; text-align: center; }
.folder-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.git-badge {
  font-size: 0.65rem; padding: 0.05rem 0.35rem; border-radius: 8px;
  background: #0f5323; color: var(--green); margin-left: auto; flex-shrink: 0;
}
.selected-paths {
  display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.5rem 0.75rem;
  border-top: 1px solid var(--border); min-height: 2rem; align-items: center;
}
.selected-paths:empty { display: none; }
.path-chip {
  display: inline-flex; align-items: center; gap: 0.35rem;
  background: var(--accent-dim); color: #fff; padding: 0.15rem 0.5rem;
  border-radius: 10px; font-family: var(--mono); font-size: 0.75rem;
}
.path-chip button {
  background: none; border: none; color: #fff; cursor: pointer;
  font-size: 0.85rem; padding: 0; line-height: 1; opacity: 0.7;
}
.path-chip button:hover { opacity: 1; }

/* Repo table */
.repo-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; margin-top: 0.5rem; }
.repo-table th {
  text-align: left; padding: 0.35rem 0.6rem; color: var(--text-muted);
  border-bottom: 1px solid var(--border); font-weight: 600; white-space: nowrap;
}
.repo-table td { padding: 0.35rem 0.6rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
.repo-table tr:last-child td { border-bottom: none; }
.repo-table tr:hover td { background: var(--bg); }
.repo-table td.num { font-family: var(--mono); text-align: right; white-space: nowrap; }
.repo-table td.ts { color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; }
.btn-reindex {
  background: none; border: 1px solid var(--border); border-radius: 4px;
  color: var(--text-muted); cursor: pointer; padding: 0.15rem 0.4rem;
  font-size: 0.9rem; line-height: 1; transition: all 0.15s;
}
.btn-reindex:hover { border-color: var(--accent); color: var(--accent); }
.btn-reindex.spinning { animation: spin 1s linear infinite; color: var(--yellow); border-color: var(--yellow); }
@keyframes spin { to { transform: rotate(360deg); } }
.btn-clear {
  background: none; border: 1px solid transparent; border-radius: 4px;
  color: var(--text-muted); cursor: pointer; padding: 0.15rem 0.4rem;
  font-size: 0.85rem; line-height: 1; transition: all 0.15s; margin-right: 0.2rem;
}
.btn-clear:hover { border-color: var(--red); color: var(--red); }
.repo-table tr.repo-cleared td { opacity: 0.4; }
.repo-table tr.repo-cleared td:last-child { opacity: 1; }

/* Status bar */
.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 0.35rem 1rem; font-size: 0.75rem; color: var(--text-muted);
  display: flex; justify-content: space-between;
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>code-rag</h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="index">Index</button>
      <button class="tab-btn" data-tab="search">Search</button>
      <button class="tab-btn" data-tab="browse">Browse</button>
    </div>
  </header>

  <!-- INDEX TAB -->
  <div id="tab-index" class="tab-panel active">
    <div class="folder-picker">
      <div class="folder-picker-bar">
        <button onclick="folderUp()" title="Go up">&#8593;</button>
        <div class="folder-breadcrumb" id="folder-breadcrumb"></div>
        <button onclick="folderGoHome()" title="Home">~</button>
      </div>
      <div class="folder-list" id="folder-list"></div>
      <div class="selected-paths" id="selected-paths"></div>
    </div>
    <div class="row mb">
      <input type="text" id="index-paths" placeholder="Or type paths (comma-separated)" style="flex:1">
      <button id="btn-start" class="btn-primary" onclick="startIndex()">Start</button>
      <button id="btn-cancel" class="btn-danger" onclick="cancelIndex()" disabled>Cancel</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-outer"><div id="progress-bar" class="progress-bar-inner"></div></div>
      <div id="progress-label" class="progress-label">Idle</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar-outer"><div id="unit-progress-bar" class="progress-bar-inner unit-progress"></div></div>
      <div id="unit-progress-label" class="progress-label">Waiting for file...</div>
    </div>
    <div id="index-log" class="log-box"></div>

    <div class="mt">
      <h3 style="font-size:0.9rem;margin-bottom:0.5rem">Index Status</h3>
      <div id="index-status" class="muted">Loading...</div>
    </div>
  </div>

  <!-- SEARCH TAB -->
  <div id="tab-search" class="tab-panel">
    <div class="row mb">
      <input type="text" id="search-query" placeholder="Search the codebase..." style="flex:1"
             onkeydown="if(event.key==='Enter')doSearch()">
      <input type="text" id="search-globs" placeholder="Globs (optional)" style="width:200px"
             onkeydown="if(event.key==='Enter')doSearch()">
      <input type="number" id="search-topk" value="10" min="1" max="20" style="width:70px" title="top_k"
             onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-primary" onclick="doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- BROWSE TAB -->
  <div id="tab-browse" class="tab-panel">
    <div id="browse-breadcrumb" class="browse-breadcrumb">
      <span class="bc-current">root</span>
    </div>
    <div id="browse-content" class="browse-list">
      <div class="muted">Loading...</div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="status-left">code-rag web UI</span>
  <span id="status-right"></span>
</div>

<script>
// ---------------------------------------------------------------------------
// Tab switching
// ---------------------------------------------------------------------------
function activateTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if (btn) btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'browse' && !_suppressHistory) loadBrowse();
  if (name === 'index') loadStatus();
  if (name !== 'browse') syncURL();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => activateTab(btn.dataset.tab));
});

// ---------------------------------------------------------------------------
// Folder picker
// ---------------------------------------------------------------------------
let currentFolder = '';
let selectedPaths = [];
let browsePath = '';
let _suppressHistory = false;

async function folderNavigate(path) {
  const params = path ? '?path=' + encodeURIComponent(path) : '';
  try {
    const res = await fetch('/api/ls' + params);
    const data = await res.json();
    if (data.error) return;
    currentFolder = data.path;
    renderBreadcrumb(data.path);
    renderFolderList(data);
  } catch(e) { /* ignore */ }
}

function renderBreadcrumb(fullPath) {
  const el = document.getElementById('folder-breadcrumb');
  const parts = fullPath.split('/').filter(Boolean);
  let html = '<span onclick="folderNavigate(\'/\')">/</span>';
  let accumulated = '';
  for (const part of parts) {
    accumulated += '/' + part;
    const p = accumulated;
    html += `<span onclick="folderNavigate('${escHtml(p)}')">${escHtml(part)}</span>/`;
  }
  el.innerHTML = html;
}

function renderFolderList(data) {
  const el = document.getElementById('folder-list');
  if (!data.dirs.length && !data.is_git) {
    el.innerHTML = '<div class="muted" style="padding:0.5rem">Empty directory</div>';
    return;
  }
  let html = '';
  // "Select this folder" row when it's a git repo
  if (data.is_git) {
    const alreadySelected = selectedPaths.includes(data.path);
    html += `<div class="folder-item" onclick="selectPath('${escHtml(data.path)}')" style="color:var(--green)">
      <span class="folder-icon">+</span>
      <span class="folder-name">Select this repo</span>
      <span class="git-badge">git</span>
      ${alreadySelected ? '<span style="margin-left:0.25rem;color:var(--yellow);font-size:0.7rem">added</span>' : ''}
    </div>`;
  }
  for (const d of data.dirs) {
    html += `<div class="folder-item" ondblclick="folderNavigate('${escHtml(d.path)}')" onclick="folderClick(this, '${escHtml(d.path)}')">
      <span class="folder-icon">&#128193;</span>
      <span class="folder-name">${escHtml(d.name)}</span>
    </div>`;
  }
  el.innerHTML = html;
}

function folderClick(el, path) {
  // Single click selects visually, hint to double-click
  document.querySelectorAll('.folder-list .folder-item').forEach(i => i.style.background = '');
  el.style.background = 'var(--surface)';
}

function folderUp() {
  if (!currentFolder || currentFolder === '/') return;
  const parent = currentFolder.replace(/\/[^/]+\/?$/, '') || '/';
  folderNavigate(parent);
}

function folderGoHome() {
  folderNavigate('');
}

function selectPath(path) {
  if (selectedPaths.includes(path)) return;
  selectedPaths.push(path);
  renderSelectedPaths();
  // Also update the text input
  document.getElementById('index-paths').value = selectedPaths.join(', ');
  // Re-render folder list to show "added" state
  folderNavigate(currentFolder);
}

function removePath(path) {
  selectedPaths = selectedPaths.filter(p => p !== path);
  renderSelectedPaths();
  document.getElementById('index-paths').value = selectedPaths.join(', ');
  // Re-render folder list
  if (currentFolder) folderNavigate(currentFolder);
}

function renderSelectedPaths() {
  const el = document.getElementById('selected-paths');
  if (!selectedPaths.length) {
    el.innerHTML = '';
    return;
  }
  el.innerHTML = selectedPaths.map(p => {
    const short = p.split('/').slice(-2).join('/');
    return `<span class="path-chip" title="${escHtml(p)}">
      ${escHtml(short)}
      <button onclick="event.stopPropagation();removePath('${escHtml(p)}')">&times;</button>
    </span>`;
  }).join('');
}

// Load initial folder on page load
folderNavigate('');

// Reconnect to any in-progress indexing job on page load.
(async () => {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data._indexing) {
      _indexingActive = true;
      document.getElementById('btn-start').disabled = true;
      document.getElementById('btn-cancel').disabled = false;
      setProgress(0, 'Reconnecting to indexing job...');
      _wsConnect(() => logMsg('Reconnected to indexing job.'));
    }
  } catch(e) { /* ignore */ }
})();

// ---------------------------------------------------------------------------
// Index status
// ---------------------------------------------------------------------------
async function loadStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    const el = document.getElementById('index-status');
    if (!data.repos || !data.repos.length) {
      el.innerHTML = 'No indexed repos.';
      return;
    }

    const { repos, total_units, embed_count } = data;
    const embeddingsMissing = embed_count < total_units;
    const embedPct = total_units > 0 ? Math.round(embed_count / total_units * 100) : 100;

    let html = '';
    if (embeddingsMissing) {
      html += `<div style="margin-bottom:0.75rem;padding:0.6rem 0.85rem;
                  border:1px solid var(--yellow);border-radius:6px;
                  background:#1e1800;color:var(--yellow);font-size:0.82rem">
        <strong>Embeddings incomplete</strong> — search is degraded until re-embedding finishes.<br>
        <div style="margin-top:0.4rem">
          <div style="display:flex;align-items:center;gap:0.5rem">
            <div style="flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden">
              <div style="height:100%;background:var(--yellow);width:${embedPct}%;transition:width 0.4s"></div>
            </div>
            <span style="font-family:var(--mono);font-size:0.75rem;white-space:nowrap">
              ${embed_count.toLocaleString()} / ${total_units.toLocaleString()} (${embedPct}%)
            </span>
          </div>
        </div>
      </div>`;
    }

    html += `<table class="repo-table">
      <thead><tr>
        <th>Repo</th><th style="text-align:right">Files</th>
        <th style="text-align:right">Units</th><th>Last indexed</th><th></th>
      </tr></thead><tbody>` +
      repos.map(r => {
        const ts = r.last_indexed_at
          ? new Date(r.last_indexed_at).toLocaleString() : 'never';
        const cleared = r.file_count === 0 && r.unit_count === 0;
        return `<tr class="${cleared ? 'repo-cleared' : ''}">
          <td><span class="badge badge-blue">${escHtml(r.repo)}</span></td>
          <td class="num">${r.file_count}</td>
          <td class="num">${r.unit_count}</td>
          <td class="ts">${ts}</td>
          <td style="text-align:right;white-space:nowrap">
            <button class="btn-clear" title="Clear index for ${escHtml(r.repo)}"
                    onclick="clearRepo('${escHtml(r.repo)}', this)">&#x1F5D1;</button>
            <button class="btn-reindex" title="Re-index ${escHtml(r.repo)}"
                    onclick="reindexRepo('${escHtml(r.root)}', this)">&#x21BB;</button>
          </td>
        </tr>`;
      }).join('') +
      `</tbody></table>`;

    el.innerHTML = html;
    document.getElementById('status-right').textContent =
      embed_count.toLocaleString() + ' / ' + total_units.toLocaleString() + ' units embedded';

    // Auto-refresh while re-embedding is in progress
    if (embeddingsMissing) {
      setTimeout(loadStatus, 3000);
    }
  } catch(e) { /* ignore */ }
}
restoreFromURL();

// ---------------------------------------------------------------------------
// WebSocket indexing
// ---------------------------------------------------------------------------
let ws = null;
let _indexingActive = false;

function _wsConnect(onopen) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/index`);

  ws.onopen = onopen;

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    handleProgress(msg);
  };

  ws.onclose = () => {
    if (_indexingActive) {
      // Job is still running server-side; reconnect after a short delay.
      setTimeout(() => _wsConnect(() => logMsg('Reconnected to indexing job.')), 1500);
    } else {
      document.getElementById('btn-start').disabled = false;
      document.getElementById('btn-cancel').disabled = true;
      loadStatus();
    }
  };

  ws.onerror = () => {
    logMsg('WebSocket error');
    setProgress(0, 'Error');
  };
}

function startIndex() {
  const pathsStr = document.getElementById('index-paths').value.trim();
  const paths = pathsStr
    ? pathsStr.split(',').map(p => p.trim()).filter(Boolean)
    : [...selectedPaths];
  if (!paths.length) return;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-cancel').disabled = false;
  document.getElementById('index-log').innerHTML = '';
  setProgress(0, 'Connecting...');
  _indexingActive = true;

  _wsConnect(() => {
    ws.send(JSON.stringify({ action: 'start', paths }));
    logMsg('Indexing started for: ' + paths.join(', '));
  });
}

function cancelIndex() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ action: 'cancel' }));
    logMsg('Cancel requested...');
  }
}

async function clearRepo(repoName, btn) {
  btn.disabled = true;
  try {
    const res = await fetch('/api/clear_repo?repo=' + encodeURIComponent(repoName), { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      const tr = btn.closest('tr');
      tr.classList.add('repo-cleared');
      tr.querySelector('td.num') && (tr.querySelectorAll('td.num')[0].textContent = '0');
      tr.querySelectorAll('td.num')[1] && (tr.querySelectorAll('td.num')[1].textContent = '0');
      logMsg('Cleared index for: ' + repoName);
    } else {
      logMsg('Clear failed: ' + (data.error || 'unknown error'));
    }
  } catch(e) {
    logMsg('Clear failed: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function reindexRepo(root, btn) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    logMsg('Cannot start: indexing already in progress.');
    return;
  }
  btn.classList.add('spinning');
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-cancel').disabled = false;
  document.getElementById('index-log').innerHTML = '';
  setProgress(0, 'Connecting...');
  _indexingActive = true;

  _wsConnect(() => {
    ws.send(JSON.stringify({ action: 'start', paths: [root] }));
    logMsg('Re-indexing: ' + root);
  });
}

function handleProgress(msg) {
  if (msg.type === 'error') {
    logMsg('ERROR: ' + msg.message);
    setProgress(0, 'Error: ' + msg.message);
    return;
  }
  if (msg.type !== 'status') return;

  const phase = msg.phase;
  if (phase === 'done') {
    _indexingActive = false;
    setProgress(100, 'Done!');
    logMsg('Indexing complete.');
    if (ws) ws.close();
    return;
  }
  if (phase === 'cancelled') {
    _indexingActive = false;
    setProgress(0, 'Cancelled');
    logMsg('Indexing cancelled.');
    if (ws) ws.close();
    return;
  }
  if (phase === 'cancelling') {
    logMsg('Cancelling...');
    return;
  }

  const total = msg.files_total || 0;
  const done = msg.files_done || 0;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  const repo = msg.repo || '';
  const file = msg.file || '';

  const unitsTotal = msg.units_total || 0;
  const unitsDone = msg.units_done || 0;

  if (phase === 'scanning') {
    const needsIndexing = msg.needs_indexing !== undefined ? msg.needs_indexing : 0;
    setProgress(pct, `Scanning ${repo}: ${done}/${total} files` + (needsIndexing > 0 ? ` (${needsIndexing} to index)` : ''));
    setUnitProgress(0, 'Waiting for file...');
  } else if (phase === 'ready_to_index') {
    const filesNeeded = msg.files_needed || 0;
    setProgress(100, `Ready to index ${repo}: ${filesNeeded} files need updating`);
    setUnitProgress(0, 'Waiting for file...');
  } else if (phase === 'indexing') {
    setProgress(pct, `Indexing ${repo}: ${done}/${total} files` + (file ? ` - ${file}` : ''));
    if (unitsTotal > 0) {
      const unitPct = Math.round((unitsDone / unitsTotal) * 100);
      setUnitProgress(unitPct, `Units: ${unitsDone}/${unitsTotal}`);
    } else {
      setUnitProgress(0, 'Waiting for file...');
    }
    if (file && done % 5 === 0) logMsg(`[${repo}] ${done}/${total} ${file}`);
  } else if (phase === 'directory_summaries') {
    setProgress(pct, `Directory summaries: ${repo}`);
    setUnitProgress(0, 'Waiting for file...');
  } else if (phase === 'done') {
    const message = msg.message || 'Indexing complete';
    setProgress(100, message);
    setUnitProgress(100, 'Done');
    logMsg(message);
  }
}

function setProgress(pct, label) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

function setUnitProgress(pct, label) {
  document.getElementById('unit-progress-bar').style.width = pct + '%';
  document.getElementById('unit-progress-label').textContent = label;
}

function logMsg(text) {
  const box = document.getElementById('index-log');
  const ts = new Date().toLocaleTimeString();
  box.innerHTML += `<div>${ts} ${text}</div>`;
  box.scrollTop = box.scrollHeight;
}

// ---------------------------------------------------------------------------
// Search
// ---------------------------------------------------------------------------
async function doSearch() {
  const q = document.getElementById('search-query').value.trim();
  if (!q) return;
  const globs = document.getElementById('search-globs').value.trim();
  const topk = document.getElementById('search-topk').value;
  syncURL();
  const params = new URLSearchParams({ q, top_k: topk });
  if (globs) globs.split(',').map(g => g.trim()).filter(Boolean).forEach(g => params.append('globs', g));

  const el = document.getElementById('search-results');
  el.innerHTML = '<div class="muted">Searching...</div>';

  try {
    const res = await fetch('/api/search?' + params);
    const data = await res.json();
    if (!data.length) {
      el.innerHTML = '<div class="muted">No results.</div>';
      return;
    }
    el.innerHTML = data.map(r => `
      <div class="result-item" onclick="openInBrowse('${escHtml(r.path)}')">
        <span class="result-score">${(r.score * 100).toFixed(1)}%</span>
        <div class="result-path">${escHtml(r.path)}</div>
        <div class="result-summary">${escHtml(r.summary || '')}</div>
      </div>
    `).join('');
  } catch(e) {
    el.innerHTML = '<div class="muted">Search failed.</div>';
  }
}

// ---------------------------------------------------------------------------
// Browse v2 — breadcrumb content browser
// ---------------------------------------------------------------------------
async function openInBrowse(unitPath) {
  activateTab('browse');
  await browseNavigate(unitPath);
}

async function loadBrowse() {
  browseNavigate('');
}

async function browseNavigate(path) {
  browsePath = path;
  syncURL(true);
  renderBrowseBreadcrumb(path);

  const el = document.getElementById('browse-content');
  el.innerHTML = '<div class="muted">Loading\u2026</div>';

  try {
    const params = path ? '?path=' + encodeURIComponent(path) : '';
    const res = await fetch('/api/browse' + params);
    const nodes = await res.json();
    await renderBrowseContent(nodes);
  } catch(e) {
    el.innerHTML = '<div class="muted">Failed to load.</div>';
  }
}

function renderBrowseBreadcrumb(path) {
  const el = document.getElementById('browse-breadcrumb');
  // Build crumbs: [{label, path}]
  const crumbs = [{label: 'root', path: ''}];
  if (path) {
    let acc = '';
    let segStart = 0;
    for (let i = 0; i <= path.length; i++) {
      const ch = i < path.length ? path[i] : null;
      if (ch === null || ch === '/' || ch === ':') {
        const seg = path.slice(segStart, i);
        if (seg) {
          const sep = segStart > 0 ? path[segStart - 1] : '';
          acc = acc ? acc + sep + seg : seg;
          crumbs.push({label: seg, path: acc});
        }
        segStart = i + 1;
      }
    }
  }
  el.innerHTML = crumbs.map((c, i) => {
    const isLast = i === crumbs.length - 1;
    const sep = i > 0 ? '<span class="bc-sep">\u203a</span>' : '';
    if (isLast) {
      return sep + `<span class="bc-current">${escHtml(c.label)}</span>`;
    }
    return sep + `<span class="bc-link" onclick="browseNavigate('${escHtml(c.path)}')">${escHtml(c.label)}</span>`;
  }).join('');
}

// Labels and CSS classes driven by unit_type (the DB value) where available,
// falling back to the browse node type for structural nodes (repo/dir/file).
const _structLabel = {repo:'repo', dir:'dir', file:'file', class:'class', self:'self'};
const _structCls   = {
  repo:'be-type-repo', dir:'be-type-dir', file:'be-type-file', class:'be-type-class',
};
const _unitLabel = {
  function:'fn', method:'fn', class:'class', module:'mod',
  paragraph:'§', h1:'#', h2:'##', h3:'###', h4:'####',
  sql:'sql', tfvars:'tf',
  struct:'struct', interface:'iface', enum:'enum',
  directory:'dir', type:'type',
};
const _unitCls = {
  function:'be-type-unit', method:'be-type-unit', class:'be-type-class',
  paragraph:'be-type-section', h1:'be-type-section', h2:'be-type-section',
  h3:'be-type-section', h4:'be-type-section',
  sql:'be-type-sql', tfvars:'be-type-sql',
  struct:'be-type-struct', interface:'be-type-interface', enum:'be-type-enum',
};

function _badgeLabel(n) {
  if (n.unit_type && _unitLabel[n.unit_type]) return _unitLabel[n.unit_type];
  if (_structLabel[n.type]) return _structLabel[n.type];
  return n.unit_type || n.type;
}
function _badgeCls(n) {
  if (n.unit_type && _unitCls[n.unit_type]) return _unitCls[n.unit_type];
  if (_structCls[n.type]) return _structCls[n.type];
  return 'be-type-unit';
}

async function renderBrowseContent(nodes) {
  const el = document.getElementById('browse-content');

  // Separate the current-level overview from navigable/leaf children
  const selfNode = nodes.find(n => n.type === 'self');
  const children = nodes.filter(n => n.type !== 'self');

  let html = '';

  // Summary banner for the current level (only when it has text)
  if (selfNode && selfNode.summary) {
    html += `<div class="browse-banner">${escHtml(selfNode.summary)}</div>`;
  }

  if (!children.length) {
    if (selfNode) {
      // Leaf unit — fetch and display the full content on this page
      el.innerHTML = html + '<div class="muted">Loading content\u2026</div>';
      try {
        const res = await fetch('/api/unit?path=' + encodeURIComponent(selfNode.path));
        const data = await res.json();
        if (data.content) {
          el.innerHTML = html + `<pre class="source-code" style="margin-top:0.75rem;max-height:none;overflow-y:visible">${escHtml(data.content)}</pre>`;
        } else {
          el.innerHTML = html + '<div class="muted">No content available.</div>';
        }
      } catch(e) {
        el.innerHTML = html + '<div class="muted">Failed to load content.</div>';
      }
    } else {
      el.innerHTML = html + '<div class="muted">Nothing here.</div>';
    }
    return;
  }

  html += children.map(renderBrowseEntry).join('');
  el.innerHTML = html;
}

function renderBrowseEntry(n) {
  const lbl = _badgeLabel(n);
  const cls = _badgeCls(n);
  const action = `browseNavigate('${escHtml(n.path)}')`;
  const chevron = n.has_children
    ? `<span class="be-chevron">\u203a</span>` : '';
  const summary = n.summary
    ? `<div class="be-summary">${escHtml(n.summary)}</div>` : '';
  return `<div class="browse-entry" onclick="${action}">` +
    `<div class="be-row1">` +
      `<span class="be-type ${cls}">${lbl}</span>` +
      `<span class="be-name">${escHtml(n.name)}</span>` +
      chevron +
    `</div>` +
    summary +
    `</div>`;
}


// ---------------------------------------------------------------------------
// URL state sync
// ---------------------------------------------------------------------------
function syncURL(push = false) {
  if (_suppressHistory) return;
  const params = new URLSearchParams();
  const activeTab = document.querySelector('.tab-btn.active')?.dataset.tab || 'index';
  if (activeTab !== 'index') params.set('tab', activeTab);
  if (activeTab === 'search') {
    const q = document.getElementById('search-query').value.trim();
    const globs = document.getElementById('search-globs').value.trim();
    const k = document.getElementById('search-topk').value;
    if (q) params.set('q', q);
    if (globs) params.set('globs', globs);
    if (k && k !== '10') params.set('k', k);
  }
  if (activeTab === 'browse' && browsePath) params.set('browse', browsePath);
  const url = params.toString() ? '?' + params.toString() : location.pathname;
  push ? history.pushState(null, '', url) : history.replaceState(null, '', url);
}

async function restoreFromURL() {
  _suppressHistory = true;
  try {
    const p = new URLSearchParams(location.search);
    const tab = p.get('tab') || 'index';
    if (p.has('q')) document.getElementById('search-query').value = p.get('q');
    if (p.has('globs')) document.getElementById('search-globs').value = p.get('globs');
    if (p.has('k')) document.getElementById('search-topk').value = p.get('k');
    activateTab(tab);
    if (tab === 'search' && p.has('q')) await doSearch();
    if (tab === 'browse') await browseNavigate(p.get('browse') || '');
  } finally {
    _suppressHistory = false;
  }
}

window.addEventListener('popstate', restoreFromURL);

// ---------------------------------------------------------------------------
// Helpers
// ---------------------------------------------------------------------------
// ---------------------------------------------------------------------------
// Keyboard shortcuts
// ---------------------------------------------------------------------------
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Escape') return;
  // Only active when the Browse tab is showing
  if (!document.getElementById('tab-browse').classList.contains('active')) return;
  e.preventDefault();
  if (!browsePath) return;
  // Strip the last segment (separated by '/' or ':')
  const lastSep = Math.max(browsePath.lastIndexOf('/'), browsePath.lastIndexOf(':'));
  browseNavigate(lastSep === -1 ? '' : browsePath.slice(0, lastSep));
});

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
